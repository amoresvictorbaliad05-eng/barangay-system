<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard</title>

  <!-- LOCAL AdminLTE v4 CSS -->
  <link rel="stylesheet" href="../dist/css/adminlte.min.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- FontAwesome (for icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="layout-fixed bg-body-tertiary">

<div class="app-wrapper">

  <!-- NAVBAR -->
  <nav class="app-header navbar navbar-expand bg-white">
    <div class="container-fluid">
      <span class="navbar-brand">Barangay Portal</span>

      <div class="ms-auto">
        <a href="../auth/login.html" class="btn btn-sm btn-danger">Logout</a>
      </div>
    </div>
  </nav>

  <!-- CONTENT -->
  <main class="app-main p-3">

    <h3>Welcome Resident</h3>

    <div class="row">

      <div class="col-md-4">
        <div class="card text-bg-primary">
          <div class="card-body">
            <h5>Submit Report</h5>
            <p>Report community issues</p>
            <a href="submit-report.html" class="btn btn-light btn-sm">Open</a>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-bg-warning">
          <div class="card-body">
            <h5>My Reports</h5>
            <p>Check status of your reports</p>
            <a href="my-reports.html" class="btn btn-light btn-sm">View</a>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card text-bg-success">
          <div class="card-body">
            <h5>Announcements</h5>
            <p>Barangay updates</p>
            <a href="#" class="btn btn-light btn-sm">Read</a>
          </div>
        </div>
      </div>

      <div class="card mt-4">
        <div class="card-header">
          <h5>Incident Reports (Monthly)</h5>
        </div>

        <div class="card-body">
          <canvas id="monthlyIncidentChart" height="120"></canvas>
        </div>
      </div>

    </div>

  </main>

</div>

<!-- LOCAL AdminLTE JS -->
<script src="../dist/js/adminlte.min.js"></script>

</body>
</html>
